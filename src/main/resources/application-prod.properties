spring.datasource.url=jdbc:postgresql://${RENDER_POSTGRES_HOST}:${RENDER_POSTGRES_PORT}/${RENDER_POSTGRES_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Port is usually provided by the platform (Render sets PORT env)
server.port=${PORT:8080}

# Fix for 403 Forbidden on Render/Mobile (X-Forwarded headers and Secure cookies)
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
