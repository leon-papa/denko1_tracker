spring.datasource.url=jdbc:postgresql://${RENDER_POSTGRES_HOST}:${RENDER_POSTGRES_PORT}/${RENDER_POSTGRES_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Port and Network
server.port=${PORT:8080}
server.address=0.0.0.0

# Fix for 403 Forbidden on Render/Mobile (X-Forwarded headers and Secure cookies)
server.forward-headers-strategy=framework
spring.h2.console.enabled=false
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Optimization for Render Free Tier (Startup Speed)
spring.main.lazy-initialization=false
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
