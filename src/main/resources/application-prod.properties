spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&prepareThreshold=0&preparedStatementCacheQueries=0&options=project%3D${PROJECT_ID:pmtdqluzjvmskotkywks}}
spring.datasource.username=${DB_USER:postgres.pmtdqluzjvmskotkywks}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Port and Network
server.port=${PORT:8080}
server.address=0.0.0.0

# Fix for 403 Forbidden on Render/Mobile (X-Forwarded headers and Secure cookies)
server.forward-headers-strategy=framework
spring.h2.console.enabled=false
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Optimization for Render Free Tier (Startup Speed)
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false
