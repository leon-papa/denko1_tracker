<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode != null} ? '記録の編集 - Denko1 Tracker' : '新規記録をつける - Denko1 Tracker'">記録 - Denko1 Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container container-sm">
    <header class="glass-panel header-flex">
        <h1 th:text="${editMode != null} ? '📝 記録の編集' : '📝 新規記録をつける'">記録をつける</h1>
        <a href="/" class="btn" style="background: rgba(255,255,255,0.1); color: white;">← 戻る</a>
    </header>

    <!-- 筆記試験フォーム（編集モードが 'skill' の場合は非表示） -->
    <section class="glass-panel" th:if="${editMode == null or editMode == 'written'}">
        <h2>📝 筆記試験（過去問）を記録</h2>
        <form th:action="@{/record/written}" th:object="${writtenRecord}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <label>過去問の年度 (例: 2023)</label>
                <input type="number" th:field="*{examYear}" required>
            </div>
            <div class="form-group">
                <label>何回目の挑戦ですか？ (1回目＝1)</label>
                <input type="number" th:field="*{attemptNumber}" required>
            </div>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 1.5rem;">
                <strong>各分野の得点を入力してください</strong><br>
                ※第一種の一般的な配点（全50問×2点=100点）を想定し、取得した点数を直接入力してください。<br>
                例えば「計算問題が8問正解した」場合は「16」と入れます。
            </p>
            <div class="form-grid">
                <div class="form-group">
                    <label>計算 (10問/20点満点)</label>
                    <input type="number" th:field="*{calcScore}" required placeholder="得点を入力">
                </div>
                <div class="form-group">
                    <label>機器 (10問/20点満点)</label>
                    <input type="number" th:field="*{memoryScore}" required placeholder="得点を入力">
                </div>
                <div class="form-group">
                    <label>施工図 (25問/50点満点)</label>
                    <input type="number" th:field="*{diagramScore}" required placeholder="得点を入力">
                </div>
                <div class="form-group">
                    <label>法令 (5問/10点満点)</label>
                    <input type="number" th:field="*{lawScore}" required placeholder="得点を入力">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"
                th:text="${editMode == 'written'} ? '変更を保存する' : '筆記試験の記録を保存'">保存</button>
        </form>
    </section>

    <!-- 技能試験フォーム（編集モードが 'written' の場合は非表示） -->
    <section class="glass-panel" th:if="${editMode == null or editMode == 'skill'}" style="margin-top: 2rem;">
        <h2>🛠️ 技能試験（公表問題）を記録</h2>
        <form th:action="@{/record/skill}" th:object="${skillRecord}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <label>公表問題番号 (No.1〜10)</label>
                <input type="number" th:field="*{problemNumber}" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label>何回目の挑戦ですか？</label>
                <input type="number" th:field="*{attemptNumber}" required>
            </div>
            <div class="form-group">
                <label>施工完了タイム（分）</label>
                <input type="number" th:field="*{completionTimeMinutes}" required placeholder="第一種の制限時間: 60分">
            </div>
            <div class="form-group">
                <label>判定（欠陥の有無）</label>
                <select th:field="*{isPassed}">
                    <option value="true">合格（欠陥なし）</option>
                    <option value="false">不合格（重大欠陥あり / 時間切れ）</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"
                th:text="${editMode == 'skill'} ? '変更を保存する' : '技能試験のタイムを保存'">保存</button>
        </form>
    </section>
</div>
</body>
</html>
