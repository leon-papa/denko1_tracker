<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー設定 - Denko1 Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container container-sm">
    <header class="glass-panel header-flex">
        <h1>⚙️ ユーザー設定</h1>
        <a href="/" class="btn" style="background: rgba(255,255,255,0.1); color: white;">← 戻る</a>
    </header>

    <!-- 完了・エラーメッセージ -->
    <div th:if="${param.nameUpdated}" class="alert-success glass-panel">
        ✅ 表示名を更新しました。
    </div>
    <div th:if="${param.passwordUpdated}" class="alert-success glass-panel">
        ✅ パスワードを変更しました。
    </div>
    <div th:if="${param.passwordError}" class="alert-error glass-panel">
        ❌ 現在のパスワードが正しくありません。
    </div>

    <!-- 表示名の変更 -->
    <section class="glass-panel">
        <h2>👤 表示名の変更</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;">
            ダッシュボードの「ようこそ、〇〇さん！」に表示される名前を変更できます。<br>
            ログインIDは変わりません。
        </p>
        <form action="/settings/display-name" method="post">
            <div class="form-group">
                <label>新しい表示名</label>
                <input type="text" name="displayName" th:value="${displayName}"
                       placeholder="例：たろう" maxlength="30" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">表示名を更新する</button>
        </form>
    </section>

    <!-- パスワードの変更 -->
    <section class="glass-panel" style="margin-top: 2rem;">
        <h2>🔒 パスワードの変更</h2>
        <form action="/settings/password" method="post">
            <div class="form-group">
                <label>現在のパスワード</label>
                <input type="password" name="currentPassword" required placeholder="現在のパスワードを入力">
            </div>
            <div class="form-group">
                <label>新しいパスワード</label>
                <input type="password" name="newPassword" required
                       placeholder="8文字以上を推奨" minlength="4">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">パスワードを変更する</button>
        </form>
    </section>

    <!-- 退会 -->
    <section class="glass-panel" style="margin-top: 2rem; border: 1px solid rgba(248,113,113,0.3);">
        <h2 style="color: #f87171;">⚠️ アカウントの削除</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;">
            アカウントを削除すると、すべての学習記録が完全に失われます。<br>
            この操作は取り消すことができません。
        </p>
        <form action="/settings/delete-account" method="post"
              onsubmit="return confirm('本当にアカウントを削除しますか？\nすべての学習データが完全に削除されます。この操作は元に戻せません。');">
            <button type="submit" class="btn"
                    style="width: 100%; background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.4);">
                アカウントを削除する
            </button>
        </form>
    </section>
</div>
</body>
</html>
