<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denko1 Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <header class="glass-panel header-flex">
        <div>
            <h1>第一種電気工事士 試験トラッカー</h1>
            <p>ようこそ、<strong th:text="${username}"></strong> さん！</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/record" class="btn btn-primary">＋ 新規記録をつける</a>
            <a href="/settings" style="background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.9rem; padding: 0; text-decoration: none;">⚙️ 設定</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" style="background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.9rem; padding: 0;">ログアウト</button>
            </form>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- カウントダウンパネル -->
        <section class="glass-panel" style="grid-column: 1 / -1; display: flex; justify-content: space-around; align-items: center; padding: 1.5rem;" th:if="${daysToWritten != null or daysToSkill != null}">
            <div th:if="${daysToWritten != null}" style="text-align: center;">
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">学科試験まで</p>
                <h3 style="margin: 0.5rem 0; font-size: 1.5rem;">
                    <span th:if="${daysToWritten > 0}">あと <strong th:text="${daysToWritten}" style="color: var(--accent); font-size: 2rem;"></strong> 日</span>
                    <span th:if="${daysToWritten == 0}" style="color: #f87171;">本日試験日！</span>
                    <span th:if="${daysToWritten < 0}" style="color: var(--text-muted);">試験終了</span>
                </h3>
                <p style="margin: 0; font-size: 0.8rem;" th:text="${#temporals.format(writtenDate, 'yyyy/MM/dd')}"></p>
            </div>
            <div style="width: 1px; height: 50px; background: var(--border-color);" th:if="${daysToWritten != null and daysToSkill != null}"></div>
            <div th:if="${daysToSkill != null}" style="text-align: center;">
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">技能試験まで</p>
                <h3 style="margin: 0.5rem 0; font-size: 1.5rem;">
                    <span th:if="${daysToSkill > 0}">あと <strong th:text="${daysToSkill}" style="color: var(--accent); font-size: 2rem;"></strong> 日</span>
                    <span th:if="${daysToSkill == 0}" style="color: #f87171;">本日試験日！</span>
                    <span th:if="${daysToSkill < 0}" style="color: var(--text-muted);">試験終了</span>
                </h3>
                <p style="margin: 0; font-size: 0.8rem;" th:text="${#temporals.format(skillDate, 'yyyy/MM/dd')}"></p>
            </div>
        </section>

        <!-- 弱点分析グラフ -->
        <section class="glass-panel chart-section">
            <h2>現在の弱点分析</h2>
            <div th:if="${weakestCategory != 'データがありません'}">
                <p class="weakness-alert">
                    ⚠️ 現在の最優先復習項目: <strong th:text="${weakestCategory}"></strong>
                </p>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div th:if="${weakestCategory == 'データがありません'}">
                <p style="color: #94a3b8; padding: 2rem;">過去問の記録がありません。「新規記録をつける」からデータを入力してください。</p>
            </div>
        </section>

        <section class="glass-panel table-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>筆記試験スコア履歴</h2>
                <a th:href="@{/download/written}" style="font-size: 0.8rem; color: var(--accent); text-decoration: none;">📥 CSV保存</a>
            </div>
            <table>
                <tr><th>年度</th><th>挑戦</th><th>計算</th><th>機器</th><th>施工図</th><th>法令</th><th>操作</th></tr>
                <tr th:each="r : ${writtenRecords}">
                    <td th:text="|${r.examYear}${r.getShortExamPeriod()}|"></td>
                    <td th:text="${r.attemptNumber} + '回目'"></td>
                    <td th:text="${r.calcScore}"></td>
                    <td th:text="${r.memoryScore}"></td>
                    <td th:text="${r.diagramScore}"></td>
                    <td th:text="${r.lawScore}"></td>
                    <td style="white-space: nowrap;">
                        <a th:href="@{/written/edit/{id}(id=${r.id})}" class="edit-btn" title="編集">✏️</a>
                        <form th:action="@{/written/delete/{id}(id=${r.id})}" method="post" onsubmit="return confirm('この記録を削除してもよろしいですか？');" style="display:inline;">
                            <button type="submit" class="delete-btn" title="削除">🗑️</button>
                        </form>
                    </td>
                </tr>
            </table>
        </section>

        <section class="glass-panel table-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>技能試験タイム履歴</h2>
                <a th:href="@{/download/skill}" style="font-size: 0.8rem; color: var(--accent); text-decoration: none;">📥 CSV保存</a>
            </div>
            <table>
                <tr><th>問題番号</th><th>挑戦</th><th>タイム</th><th>合否</th><th>操作</th></tr>
                <tr th:each="s : ${skillRecords}">
                    <td th:text="'No.' + ${s.problemNumber}"></td>
                    <td th:text="${s.attemptNumber} + '回目'"></td>
                    <td th:text="${s.completionTimeMinutes} + ' 分'" th:classappend="${s.completionTimeMinutes <= 60 ? 'good-time' : 'over-time'}"></td>
                    <td>
                        <span th:text="${s.isPassed ? '合格' : '欠陥あり'}" th:class="${s.isPassed ? 'pass' : 'fail'}"></span>
                    </td>
                    <td style="white-space: nowrap;">
                        <a th:href="@{/skill/edit/{id}(id=${s.id})}" class="edit-btn" title="編集">✏️</a>
                        <form th:action="@{/skill/delete/{id}(id=${s.id})}" method="post" onsubmit="return confirm('この記録を削除してもよろしいですか？');" style="display:inline;">
                            <button type="submit" class="delete-btn" title="削除">🗑️</button>
                        </form>
                    </td>
                </tr>
            </table>
        </section>
    </div>
</div>

<!-- Thymeleafで計算したデータをJavaScriptに渡してグラフを描画 -->
<script th:if="${weakestCategory != 'データがありません'}" th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ ['計算', '機器', '施工図', '法令'];
    const dataPoints = /*[[${chartData}]]*/ [0, 0, 0, 0];

    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: '最新の正答率(%)',
                data: dataPoints,
                backgroundColor: 'rgba(245, 158, 11, 0.2)', // アンバーカラー（現場の警告色イメージ）
                borderColor: 'rgba(245, 158, 11, 1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(245, 158, 11, 1)'
            }]
        },
        options: {
            scales: {
                r: {
                    angleLines: { color: 'rgba(255, 255, 255, 0.15)' },
                    grid: { color: 'rgba(255, 255, 255, 0.15)' },
                    pointLabels: { color: '#e2e8f0', font: { size: 14 } },
                    ticks: { 
                        color: 'rgba(255, 255, 255, 0.5)', 
                        backdropColor: 'transparent', 
                        stepSize: 20,
                        font: { size: 10 }
                    },
                    min: 0,
                    max: 100
                }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0' } }
            }
        }
    });
</script>
</body>
</html>
