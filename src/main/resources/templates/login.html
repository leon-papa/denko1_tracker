<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Denko1 Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container container-sm" style="margin-top: 5rem;">
    <div class="glass-panel" style="text-align: center;">
        <h1>Denko1 Tracker</h1>
        <p>ログインして学習を再開しましょう</p>
        
        <form th:action="@{/login}" method="post" style="margin-top: 2rem;">
            <div th:if="${param.error}" style="color: #f87171; margin-bottom: 1rem;">
                ユーザー名またはパスワードが正しくありません
            </div>
            <div th:if="${param.logout}" style="color: #10b981; margin-bottom: 1rem;">
                ログアウトしました
            </div>
            <div class="form-group">
                <label>ユーザー名</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">ログイン</button>
        </form>
        
        <p style="margin-top: 2rem;">
            アカウントをお持ちでないですか？ <a href="/register" style="color: var(--accent);">新規登録</a>
        </p>
    </div>
</div>
</body>
</html>
