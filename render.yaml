services:
  # Web Service for Spring Boot
  - type: web
    name: denko1-tracker
    env: docker
    plan: free
    region: singapore # 日本から近いリージョンを選択
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: RENDER_POSTGRES_HOST
        fromDatabase:
          name: denko1-db
          property: host
      - key: RENDER_POSTGRES_PORT
        fromDatabase:
          name: denko1-db
          property: port
      - key: RENDER_POSTGRES_DB
        fromDatabase:
          name: denko1-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: denko1-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: denko1-db
          property: password

databases:
  # Managed PostgreSQL
  - name: denko1-db
    plan: free
    region: singapore
