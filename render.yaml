services:
  # Web Service for Spring Boot
  - type: web
    name: denko1-tracker
    env: docker
    plan: free
    region: singapore # 日本から近いリージョンを選択
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Database Connection (Supabase)
      # 以下の変数はDashboard上の「手動入力」を優先するため、Blueprint同期時に既存の値を保持するよう設定
      - key: DB_HOST
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
      - key: DB_PASSWORD
      - key: PROJECT_ID
        value: pmtdqluzjvmskotkywks
